{% extends "base.html" %}
{% block title %}Assign Contact — ITAM{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Assign Contact</h1>
  <a href="{% url 'config_detail' config.pk %}" class="btn btn-secondary">Cancel</a>
</div>
<p style="margin-bottom:16px;color:#64748b">Config: <strong>{{ config.hostname }}</strong></p>
<div class="card" style="max-width:400px">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>{{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Assign</button>
  </form>
</div>
{% endblock %}
