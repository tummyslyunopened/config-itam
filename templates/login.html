<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — ITAM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 32px; width: 320px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #1e293b; }
    label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; margin-bottom: 14px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
    button { width: 100%; padding: 8px; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { color: #dc2626; font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <h1>ITAM</h1>
  {% if form.errors %}
  <p class="error">Invalid username or password.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" autofocus>
    <label>Password</label>
    <input type="password" name="password">
    <button type="submit">Log in</button>
  </form>
</div>
</body>
</html>
