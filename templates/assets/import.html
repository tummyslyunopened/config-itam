{% extends "base.html" %}
{% block title %}Import Assets — ITAM{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Import Assets</h1>
  <a href="{% url 'asset_list' %}" class="btn btn-secondary">Cancel</a>
</div>
<div class="card" style="max-width:480px">
  <p style="margin-bottom:12px;color:#64748b">CSV must have headers: <code>make, model, serial, type, status, location, notes</code></p>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label>CSV File</label>
      <input type="file" name="csv_file" accept=".csv">
    </div>
    <button type="submit" class="btn btn-primary">Import</button>
  </form>
</div>
{% endblock %}
