{% extends "base.html" %}
{% block title %}Locations — ITAM{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Locations</h1>
  <a href="{% url 'location_create' %}" class="btn btn-primary">+ Add Location</a>
</div>
<table>
  <thead><tr><th>Site</th><th>Room</th><th>Assets</th><th></th></tr></thead>
  <tbody>
  {% for l in locations %}
  <tr>
    <td>{{ l.site }}</td>
    <td>{{ l.room|default:"—" }}</td>
    <td>{{ l.assets.count }}</td>
    <td><a href="{% url 'location_edit' l.pk %}" class="btn btn-secondary btn-sm">Edit</a></td>
  </tr>
  {% empty %}<tr><td colspan="4" style="color:#94a3b8;text-align:center;padding:20px">No locations yet</td></tr>{% endfor %}
  </tbody>
</table>
{% endblock %}
