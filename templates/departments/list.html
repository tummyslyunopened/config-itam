{% extends "base.html" %}
{% block title %}Departments — ITAM{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Departments</h1>
  <a href="{% url 'department_create' %}" class="btn btn-primary">+ Add Department</a>
</div>
<table>
  <thead><tr><th>Name</th><th>Contacts</th><th></th></tr></thead>
  <tbody>
  {% for d in departments %}
  <tr>
    <td>{{ d.name }}</td>
    <td>{{ d.contacts.count }}</td>
    <td><a href="{% url 'department_edit' d.pk %}" class="btn btn-secondary btn-sm">Edit</a></td>
  </tr>
  {% empty %}<tr><td colspan="3" style="color:#94a3b8;text-align:center;padding:20px">No departments</td></tr>{% endfor %}
  </tbody>
</table>
{% endblock %}
